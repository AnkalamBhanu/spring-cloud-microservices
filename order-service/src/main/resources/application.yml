server:
  port: 9192

spring:
  application:
    name: ORDER-SERVICE
  datasource:
    url: jdbc:h2:file:C:/h2data/order_db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  cloud:
    loadbalancer:
      cache:
        enabled: false   # ← key fix

