server:
  port: 9191

spring:
  zipkin:
    base-url: http://localhost:9411/
  application:
    name: PAYMENT-SERVICE
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:file:C:/h2data/payment_db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  cloud:
    loadbalancer:
      cache:
        enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
logging:
  file:
    name: C:/Users/TIAA User/Desktop/microservice-log.log

management:
  tracing:
    enabled: false
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans