server:
  port: 9191
spring:
  h2:
    console:
      enabled: true
  application:
    name: PAYMENT-SERVICE
  datasource:
    url: jdbc:h2:file:C:/h2data/payment_db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  cloud:
    loadbalancer:
      cache:
        enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create

